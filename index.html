    <style>
        :root {
            --primary-green: #064e3b;
            --accent-gold: #fbbf24;
            --text-main: #111827;
            --bg-soft: #f8fafc;
        }

        body { 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
            background-image: radial-gradient(var(--primary-green) 0.5px, transparent 0.5px);
            background-size: 30px 30px;
            background-color: #f1f5f9;
            opacity: 0.95;
            font-family: 'Pretendard', sans-serif; 
            -webkit-font-smoothing: antialiased;
        }

        .card {
            background: rgba(255, 255, 255, 0.85);
            padding: 60px 40px;
            border-radius: 50px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.08);
            text-align: center;
            max-width: 500px;
            width: 90%;
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255,255,255,0.6);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .logo-area img {
            height: 90px; 
            width: auto;
            margin-bottom: 25px; 
            border-radius: 22px;
            box-shadow: 0 10px 20px rgba(6, 78, 59, 0.2);
        }

        h1 { 
            color: var(--primary-green); 
            margin: 0 0 12px 0; 
            font-size: 2.6rem; 
            font-weight: 900;
            letter-spacing: -2px;
        }

        .tagline {
            color: var(--text-main);
            margin-bottom: 35px;
            line-height: 1.5;
            font-size: 1.25rem;
            font-weight: 500;
            word-break: keep-all;
        }

        .features {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
        }

        .feature-item {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--primary-green);
            background: rgba(6, 78, 59, 0.1);
            padding: 8px 18px;
            border-radius: 100px;
        }

        .buttons { 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            align-items: center;
        }
        
        .badge {
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .badge img {
            height: 62px;
            width: auto;
        }
        
        .badge:hover {
            transform: scale(1.05);
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1));
        }

        .badge-google-play img {
            height: 90px;
            margin: -14px 0;
        }

        .footer {
            margin-top: 50px;
            font-size: 0.9rem;
            color: #94a3b8;
        }

        @media (max-width: 480px) {
            .card { padding: 50px 25px; }
            h1 { font-size: 2rem; }
            .tagline { font-size: 1.1rem; }
            .features { flex-wrap: wrap; }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo-area">
            <img src="icon.png" alt="Roundup 로고">
        </div>
        
        <h1>Roundup</h1>
        <p class="tagline">
            매너가 실력이 되는 곳,<br>
            <strong>노쇼 없는</strong> 골프 조인 파트너 찾기
        </p>

        <div class="features">
            <span class="feature-item">⛳️ 실시간 조인</span>
            <span class="feature-item">🤝 매너 평판</span>
            <span class="feature-item">🚫 노쇼 방지</span>
        </div>

        <div class="buttons">
            <a href="https://apps.apple.com/kr/app/6759701403" class="badge" target="_blank" onclick="gtag('event', 'click_app_store', {'platform': 'ios'});">
                <img src="https://tools.applemediaservices.com/api/badges/download-on-the-app-store/black/ko-kr?size=250x83" alt="App Store 다운로드">
            </a>
            
            <a href="https://play.google.com/store/apps/details?id=com.roundup.golf" class="badge badge-google-play" target="_blank" onclick="gtag('event', 'click_google_play', {'platform': 'android'});">
                <img src="https://play.google.com/intl/en_us/badges/static/images/badges/ko_badge_web_generic.png" alt="Google Play 다운로드">
            </a>
        </div>

        <div class="footer">
            © 2026 Roundup. Premium Golf Community.
        </div>
    </div>
