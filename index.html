<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roundup - 골프의 시작</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        :root {
            --primary-color: #1d1d1f;
            --accent-color: #28a745; /* 골프 느낌의 그린 포인트 */
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }

        body { 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            background: var(--bg-gradient);
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif; 
        }

        .card {
            background: rgba(255, 255, 255, 0.9);
            padding: 50px 40px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
            backdrop-filter: blur(10px); /* 배경 흐림 효과 */
            border: 1px solid rgba(255,255,255,0.3);
        }

        .logo-area {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        h1 { 
            color: var(--primary-color); 
            margin: 0 0 10px 0; 
            font-size: 2.2rem; 
            font-weight: 800;
            letter-spacing: -1px;
        }

        p {
            color: #636e72;
            margin-bottom: 35px;
            line-height: 1.6;
            font-size: 1.1rem;
        }

        .buttons { 
            display: flex; 
            flex-direction: column; /* 모바일 우선으로 세로 정렬 */
            gap: 12px; 
            justify-content: center; 
            align-items: center;
        }
        
        .badge {
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: block;
        }
        
        .badge img {
            height: 58px;
            display: block;
        }
        
        .badge:hover {
            transform: translateY(-5px); /* 위로 살짝 떠오르는 효과 */
            filter: brightness(1.1);
        }

        /* 푸터 정보 */
        .footer {
            margin-top: 30px;
            font-size: 0.8rem;
            color: #b2bec3;
        }

        /* 데스크탑에서는 가로로 배치 */
        @media (min-width: 480px) {
            .buttons { flex-direction: row; }
            .card { max-width: 500px; }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo-area">⛳️</div>
        <h1>Roundup</h1>
        <p>더 스마트한 골프 라이프의 시작<br>지금 바로 라운드업을 만나보세요.</p>
        
        <div class="buttons">
            <a href="#" class="badge">
                <img src="https://tools.applemediaservices.com/api/badges/download-on-the-app-store/black/ko-kr?size=250x83&amp;releaseDate=1310688000&h=656960d73809228d61853d9e0300977a" alt="Download on the App Store">
            </a>
            
            <a href="#" class="badge">
                <img src="https://play.google.com/intl/en_us/badges/static/images/badges/ko_badge_web_generic.png" alt="Get it on Google Play" style="height: 84px; margin: -13px 0;">
            </a>
        </div>

        <div class="footer">
            © 2026 Roundup. All rights reserved.
        </div>
    </div>
</body>
</html>
