<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roundup - 골프 조인 & 라운딩 파트너 찾기</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        :root {
            --primary-color: #1d1d1f;
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }

        body { 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            background: var(--bg-gradient);
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif; 
        }

        .card {
            background: rgba(255, 255, 255, 0.9);
            padding: 50px 40px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
            width: 90%;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
        }

        /* 로고 스타일 조정 */
        .logo-area img {
            height: 80px; 
            width: auto;
            margin-bottom: 20px; 
        }

        h1 { 
            color: var(--primary-color); 
            margin: 0 0 10px 0; 
            font-size: 2.2rem; 
            font-weight: 800;
            letter-spacing: -1px;
        }

        p {
            color: #636e72;
            margin-bottom: 35px;
            line-height: 1.6;
            font-size: 1.1rem;
        }

        /* 핵심 키워드 강조 */
        .highlight {
            color: #28a745; /* 골프 느낌의 초록색 */
            font-weight: 700;
        }

        .buttons { 
            display: flex; 
            flex-direction: row; 
            gap: 15px; 
            justify-content: center; 
            align-items: center;
            flex-wrap: wrap;
        }
        
        .badge {
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: block;
            text-decoration: none;
        }
        
        .badge img {
            height: 60px;
            width: auto;
            display: block;
        }
        
        .badge:hover {
            transform: translateY(-5px);
            filter: brightness(1.1);
        }

        .badge-google-play img {
            height: 86px;
            margin: -13px 0;
        }

        .footer {
            margin-top: 30px;
            font-size: 0.8rem;
            color: #b2bec3;
        }

        @media (max-width: 480px) {
            .card { padding: 40px 20px; }
            .logo-area img { height: 60px; }
            h1 { font-size: 1.8rem; }
            p { font-size: 1rem; }
            .badge img { height: 50px; }
            .badge-google-play img { height: 72px; margin: -11px 0; }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo-area">
            <img src="icon.png" alt="Roundup Logo">
        </div>
        
        <h1>Roundup</h1>
        <p>
            내 주변 골퍼들과 함께하는 즐거움<br>
            <span class="highlight">골프 조인부터 라운딩 파트너까지</span><br>
            지금 바로 라운드업에서 시작해 보세요.
        </p>
        
        <div class="buttons">
            <a href="#" class="badge badge-app-store">
                <img src="https://tools.applemediaservices.com/api/badges/download-on-the-app-store/black/ko-kr?size=250x83&amp;releaseDate=1310688000&h=656960d73809228d61853d9e0300977a" alt="App Store에서 다운로드 하기">
            </a>
            
            <a href="#" class="badge badge-google-play">
                <img src="https://play.google.com/intl/en_us/badges/static/images/badges/ko_badge_web_generic.png" alt="Google Play에서 다운로드">
            </a>
        </div>

        <div class="footer">
            © 2026 Roundup. All rights reserved.
        </div>
    </div>
</body>
</html>
