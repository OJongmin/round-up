<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roundup - 골프의 시작</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        :root {
            --primary-color: #1d1d1f;
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }

        body { 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            background: var(--bg-gradient);
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif; 
        }

        .card {
            background: rgba(255, 255, 255, 0.9);
            padding: 50px 40px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px; /* PC에서도 보기 좋게 최대 너비 조정 */
            width: 90%;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
        }

        .logo-area {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        h1 { 
            color: var(--primary-color); 
            margin: 0 0 10px 0; 
            font-size: 2.2rem; 
            font-weight: 800;
            letter-spacing: -1px;
        }

        p {
            color: #636e72;
            margin-bottom: 35px;
            line-height: 1.6;
            font-size: 1.1rem;
        }

        .buttons { 
            display: flex; 
            flex-direction: row; /* 기본 가로 정렬 */
            gap: 15px; /* 버튼 사이 간격 */
            justify-content: center; 
            align-items: center;
            flex-wrap: wrap; /* 화면 작아지면 자동 줄바꿈 */
        }
        
        .badge {
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: block;
            text-decoration: none; /* 링크 밑줄 제거 */
        }
        
        /* 배지 이미지 크기 통일 */
        .badge img {
            height: 60px; /* 높이를 60px로 통일 */
            width: auto; /* 비율 유지 */
            display: block;
        }
        
        .badge:hover {
            transform: translateY(-5px); /* 호버 시 떠오르는 효과 */
            filter: brightness(1.1);
        }

        /* 구글 플레이 배지 여백 미세 조정 */
        .badge-google-play img {
            height: 86px; /* 이미지 자체 여백 때문에 높이를 더 크게 잡음 */
            margin: -13px 0; /* 음수 마진으로 실제 보이는 크기를 맞춤 */
        }

        .footer {
            margin-top: 30px;
            font-size: 0.8rem;
            color: #b2bec3;
        }

        /* 모바일 화면 조정 */
        @media (max-width: 480px) {
            .card { padding: 40px 20px; }
            h1 { font-size: 1.8rem; }
            p { font-size: 1rem; }
            .badge img { height: 50px; } /* 모바일에서는 살짝 작게 */
            .badge-google-play img { height: 72px; margin: -11px 0; }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo-area">⛳️</div>
        <h1>Roundup</h1>
        <p>더 스마트한 골프 라이프의 시작<br>지금 바로 라운드업을 만나보세요.</p>
        
        <div class="buttons">
            <a href="#" class="badge badge-app-store">
                <img src="https://tools.applemediaservices.com/api/badges/download-on-the-app-store/black/ko-kr?size=250x83&amp;releaseDate=1310688000&h=656960d73809228d61853d9e0300977a" alt="App Store에서 다운로드 하기">
            </a>
            
            <a href="#" class="badge badge-google-play">
                <img src="https://play.google.com/intl/en_us/badges/static/images/badges/ko_badge_web_generic.png" alt="Google Play에서 다운로드">
            </a>
        </div>

        <div class="footer">
            © 2026 Roundup. All rights reserved.
        </div>
    </div>
</body>
</html>
